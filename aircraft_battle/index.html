<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>飞机大战 - Aircraft Battle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>✈️ 飞机大战</h1>
        <div class="info-bar">
            <span>得分: <span id="score">0</span></span>
            <span>生命: <span id="lives">❤️❤️❤️</span></span>

        <canvas id="gameCanvas" width="400" height="550"></canvas>
        <p id="message">按 空格键 开始 | ←→移动 | 自动射击</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
