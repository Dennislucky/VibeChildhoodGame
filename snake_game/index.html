<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 - Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        <div class="score-board">
            <span>得分: <span id="score">0</span></span>
            <span>最高分: <span id="highScore">0</span></span>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <p id="message">按 空格键 开始游戏</p>
            <div class="mobile-controls">
                <button class="ctrl-btn" id="btnUp">▲</button>
                <div class="ctrl-row">
                    <button class="ctrl-btn" id="btnLeft">◀</button>
                    <button class="ctrl-btn" id="btnDown">▼</button>
                    <button class="ctrl-btn" id="btnRight">▶</button>
                </div>
            </div>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
