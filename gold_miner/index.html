<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>黄金矿工 - Gold Miner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="start-screen" class="screen">
            <h1>⛏️ 黄金矿工</h1>
            <p>经典挖矿游戏，抓取地下宝物！</p>
            <div class="controls-info">
                <p>⬇️ / 空格 / 点击 : 放下钩子</p>
                <p>在限定时间内达到目标金额即可过关！</p>
            </div>
            <button onclick="startGame()">开始挖矿</button>
        </div>
        <div id="game-screen" class="screen" style="display:none;">
            <div id="hud">
                <div>⏱️ <span id="timer">30</span>s</div>
                <div>🎯 目标: $<span id="target">200</span></div>
                <div>💰 $<span id="money">0</span></div>
                <div>关卡: <span id="level">1</span></div>
            </div>
            <canvas id="gameCanvas"></canvas>
        </div>
        <div id="level-clear" class="screen" style="display:none;">
            <h1>🎉 过关!</h1>
            <p>本关收入: $<span id="level-money">0</span></p>
            <button onclick="nextLevel()">下一关</button>
        </div>
        <div id="gameover-screen" class="screen" style="display:none;">
            <h1>💔 未达标</h1>
            <p>收入: $<span id="final-money">0</span> / 目标: $<span id="final-target">0</span></p>
            <p>到达关卡: <span id="final-level">1</span></p>
            <button onclick="startGame()">重新开始</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
