<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - Tetris</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🧱 俄罗斯方块</h1>
        <div class="game-area">
            <div class="side-panel">
                <div class="panel-box">
                    <h3>下一个</h3>
                    <canvas id="nextCanvas" width="100" height="100"></canvas>
                </div>
                <div class="panel-box">
                    <p>得分</p><p class="val" id="score">0</p>
                </div>
                <div class="panel-box">
                    <p>等级</p><p class="val" id="level">1</p>
                </div>
                <div class="panel-box">
                    <p>行数</p><p class="val" id="lines">0</p>
                </div>
            </div>
            <canvas id="gameCanvas" width="250" height="500"></canvas>
        </div>
        <p id="message">按 空格键 开始 | ↑旋转 ↓加速 ←→移动</p>
    </div>
    <script src="game.js"></script>
</body>
</html>
